<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电影发现引擎 - 图片测试页</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

  /* 顶部导航 */
  .header { background: linear-gradient(135deg, #141e30, #243b55); color: #fff; padding: 20px; text-align: center; }
  .header h1 { font-size: 22px; }
  .header p { font-size: 13px; opacity: .8; margin-top: 4px; }

  /* Tab 导航 */
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 10; }
  .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-size: 14px; color: #666; border-bottom: 2px solid transparent; transition: all .2s; }
  .tab:hover { color: #1890ff; }
  .tab.active { color: #1890ff; border-bottom-color: #1890ff; font-weight: 600; }
  .tab .badge { display: inline-block; background: #1890ff; color: #fff; border-radius: 10px; padding: 0 8px; font-size: 11px; margin-left: 4px; }

  /* 加载 / 错误提示 */
  .loading { text-align: center; padding: 60px 20px; color: #999; }
  .loading::after { content: ''; display: inline-block; width: 24px; height: 24px; margin-left: 8px; border: 3px solid #e0e0e0; border-top-color: #1890ff; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { text-align: center; padding: 40px; color: #ff4d4f; }
  .error-msg .code { font-size: 48px; font-weight: bold; opacity: .3; }
  .empty-msg { text-align: center; padding: 60px 20px; color: #999; }

  /* 电影网格 */
  .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; padding: 16px; max-width: 1200px; margin: 0 auto; }
  @media (min-width: 768px) { .movie-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }
  @media (min-width: 1024px) { .movie-grid { grid-template-columns: repeat(5, 1fr); } }

  .movie-card { background: #fff; border-radius: 12px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .2s, box-shadow .2s; }
  .movie-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
  .movie-card .poster-wrap { position: relative; width: 100%; padding-top: 150%; background: #f0f0f0; overflow: hidden; }
  .movie-card .poster-wrap img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity .3s; }
  .movie-card .poster-wrap img.loading { opacity: 0; }
  .movie-card .poster-wrap .img-status { position: absolute; top: 8px; right: 8px; font-size: 18px; line-height: 1; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
  .movie-card .poster-wrap .fallback { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #ccc; font-size: 40px; }
  .movie-card .info { padding: 10px 12px 12px; }
  .movie-card .info h3 { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-card .info .meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 12px; color: #999; }
  .movie-card .info .meta .rating { color: #faad14; font-weight: 600; }
  .movie-card .info .genres { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .movie-card .info .genres span { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #f0f0f0; color: #666; }

  /* 状态指示器 */
  .status-ok { color: #52c41a; }
  .status-fail { color: #ff4d4f; }
  .status-warn { color: #faad14; }

  /* 详情面板 */
  .detail-panel { background: #fff; border-top: 1px solid #e0e0e0; margin-top: 8px; padding: 0; max-height: 0; overflow: hidden; transition: max-height .4s ease, padding .3s; }
  .detail-panel.open { max-height: 800px; padding: 20px 16px; }
  .detail-panel .detail-inner { max-width: 1200px; margin: 0 auto; }
  .detail-panel .detail-row { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; }
  .detail-panel .detail-poster { width: 140px; height: 210px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: #f0f0f0; }
  .detail-panel .detail-info { flex: 1; min-width: 200px; }
  .detail-panel .detail-info h2 { font-size: 20px; }
  .detail-panel .detail-info .sub { font-size: 13px; color: #999; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
  .detail-panel .detail-info .desc { font-size: 13px; line-height: 1.6; margin-top: 8px; color: #555; }
  .detail-panel .section-title { font-size: 15px; font-weight: 600; margin-top: 20px; margin-bottom: 10px; }
  .detail-panel .cast-list { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
  .detail-panel .cast-item { text-align: center; flex-shrink: 0; width: 70px; }
  .detail-panel .cast-item img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: #f0f0f0; }
  .detail-panel .cast-item .name { font-size: 11px; margin-top: 4px; color: #333; }
  .detail-panel .cast-item .char { font-size: 10px; color: #999; }

  /* 测试统计 */
  .stats { max-width: 1200px; margin: 8px auto 0; padding: 0 16px; }
  .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; }
  .stats-bar .stat-item { background: #fff; padding: 6px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .stats-bar .stat-item .num { font-weight: 700; font-size: 16px; }
</style>
</head>
<body>

<div class="header">
  <h1>🎬 电影发现引擎 — 图片显示测试</h1>
  <p>测试电影信息与图片通过后端代理是否正确加载</p>
</div>

<div class="tabs" id="tabs"></div>

<div class="stats" id="stats"></div>

<div class="movie-grid" id="grid"></div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-inner" id="detailContent"></div>
</div>

<script>
const API = '/api';
const TMDB_CDN = 'https://image.tmdb.org/t/p/w500';

// 图片 URL 解析：null → SVG 占位，否则拼接 TMDB CDN
function resolveImg(path) {
  if (!path) return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300"><rect fill="%23f0f0f0" width="200" height="300"/><text x="100" y="155" text-anchor="middle" font-size="60" fill="%23ccc">🎬</text></svg>';
  return TMDB_CDN + path;
}

// 当前状态
let currentTab = 'popular';
let moviesCache = {};
let loadedCount = 0;
let errorCount = 0;
let detailOpen = false;

// Tab 配置
const TABS = [
  { key: 'popular', label: '热门', endpoint: '/movie/popular' },
  { key: 'top_rated', label: '高分', endpoint: '/movie/top_rated' },
  { key: 'now_playing', label: '正在上映', endpoint: '/movie/now_playing' },
];

// 初始化
async function init() {
  renderTabs();
  await loadTab('popular');
}

// 渲染 Tab
function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = TABS.map(t =>
    `<div class="tab${t.key === currentTab ? ' active' : ''}" data-key="${t.key}" onclick="switchTab('${t.key}')">${t.label}</div>`
  ).join('');
}

// 切换 Tab
async function switchTab(key) {
  currentTab = key;
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });
  closeDetail();
  await loadTab(key);
}

// 加载列表
async function loadTab(key) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="loading">加载中</div>';

  // 如果已缓存，直接显示
  if (moviesCache[key]) {
    renderMovies(moviesCache[key]);
    updateStats();
    return;
  }

  try {
    const resp = await fetch(`${API}${TABS.find(t => t.key === key).endpoint}`);
    const json = await resp.json();
    if (!json.success) throw new Error(json.error);

    const results = json.data.results || [];
    // 使用 resolveImg 统一处理三种路径格式（TMDB 哈希 / Douban 绝对 / null 兜底）
    results.forEach(m => {
      m._posterUrl = resolveImg(m.poster_path);
      m._backdropUrl = resolveImg(m.backdrop_path);
    });
    moviesCache[key] = results;
    renderMovies(results);
  } catch (e) {
    grid.innerHTML = `<div class="error-msg"><div class="code">⚠</div><p>加载失败: ${e.message}</p></div>`;
  }
  updateStats();
}

// 渲染电影网格
function renderMovies(movies) {
  const grid = document.getElementById('grid');
  if (!movies || movies.length === 0) {
    grid.innerHTML = '<div class="empty-msg">暂无电影数据</div>';
    return;
  }

  loadedCount = 0;
  errorCount = 0;

  grid.innerHTML = movies.map(m => {
    const year = (m.release_date || '').slice(0, 4);
    const genres = (m.genre_names || []).map(g => `<span>${g}</span>`).join('');
    return `
      <div class="movie-card" onclick="loadDetail(${m.id}, this)">
        <div class="poster-wrap">
          <img class="loading" data-src="${m._posterUrl}"
               alt="${m.title}"
               onload="imgLoaded(this)"
               onerror="imgError(this)">
          <div class="img-status" id="status-${m.id}">⏳</div>
          <div class="fallback" id="fallback-${m.id}" style="display:none">🎬</div>
        </div>
        <div class="info">
          <h3 title="${m.title}">${m.title}</h3>
          <div class="meta">
            <span class="rating">⭐ ${m.vote_average.toFixed(1)}</span>
            ${year ? `<span>${year}</span>` : ''}
          </div>
          ${genres ? `<div class="genres">${genres}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  // 触发懒加载
  lazyLoadImages();
}

// 懒加载图片
function lazyLoadImages() {
  const imgs = document.querySelectorAll('.poster-wrap img.loading');
  imgs.forEach(img => {
    img.src = img.dataset.src;
  });
}

// 图片加载成功
function imgLoaded(img) {
  img.classList.remove('loading');
  const card = img.closest('.movie-card');
  if (card) {
    const statusEl = card.querySelector('.img-status');
    if (statusEl) statusEl.textContent = '✅';
  }
  loadedCount++;
  updateStats();
}

// 图片加载失败
function imgError(img) {
  img.style.display = 'none';
  const card = img.closest('.movie-card');
  if (card) {
    const statusEl = card.querySelector('.img-status');
    if (statusEl) statusEl.textContent = '❌';
    const fallback = card.querySelector('.fallback');
    if (fallback) fallback.style.display = 'block';
  }
  errorCount++;
  updateStats();
}

// 更新统计
function updateStats() {
  const container = document.getElementById('stats');
  container.innerHTML = `
    <div class="stats-bar">
      <div class="stat-item">📊 电影: <span class="num">${(moviesCache[currentTab] || []).length}</span></div>
      <div class="stat-item status-ok">✅ 图片成功: <span class="num">${loadedCount}</span></div>
      <div class="stat-item status-fail">❌ 图片失败: <span class="num">${errorCount}</span></div>
      <div class="stat-item">📌 当前: <span>${TABS.find(t => t.key === currentTab)?.label || ''}</span></div>
    </div>
  `;
}

// 加载详情
async function loadDetail(movieId, cardEl) {
  // 高亮选中的卡片
  document.querySelectorAll('.movie-card').forEach(el => el.style.outline = '');
  if (cardEl) cardEl.style.outline = '2px solid #1890ff';

  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');

  if (detailOpen && panel.dataset.movieId === String(movieId)) {
    closeDetail();
    return;
  }

  panel.dataset.movieId = movieId;
  content.innerHTML = '<div class="loading">加载详情中</div>';
  panel.classList.add('open');
  detailOpen = true;

  try {
    const resp = await fetch(`${API}/movie/${movieId}`);
    const json = await resp.json();
    if (!json.success) throw new Error(json.error);

    renderDetail(json.data);
  } catch (e) {
    content.innerHTML = `<div class="error-msg">详情加载失败: ${e.message}</div>`;
  }
}

// 渲染详情
function renderDetail(m) {
  const content = document.getElementById('detailContent');
  const castHtml = (m.cast || []).slice(0, 8).map(a => {
    const profileSrc = resolveImg(a.profile_path);
    return `
      <div class="cast-item">
        <img src="${profileSrc}" alt="${a.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f0f0f0%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2240%22 fill=%22%23ccc%22>👤</text></svg>'">
        <div class="name">${a.name}</div>
        <div class="char">${a.character}</div>
      </div>
    `;
  }).join('');

  const recHtml = (m.recommendations || []).slice(0, 6).map(r => {
    return `
      <div class="movie-card" style="min-width:130px;flex-shrink:0" onclick="loadDetail(${r.id}, this)">
        <div class="poster-wrap" style="padding-top:150%">
          <img class="loading" data-src="${resolveImg(r.poster_path)}" alt="${r.title}"
               onload="imgLoaded(this)" onerror="imgError(this)">
        </div>
        <div class="info">
          <h3>${r.title}</h3>
          <div class="meta"><span class="rating">⭐ ${(r.vote_average || 0).toFixed(1)}</span></div>
        </div>
      </div>
    `;
  }).join('');

  const year = (m.release_date || '').slice(0, 4);
  const runtimeStr = m.runtime ? `${Math.floor(m.runtime / 60)}h${m.runtime % 60}m` : '';
  const genres = (m.genre_names || []).map(g => `<span style="display:inline-block;font-size:11px;padding:2px 10px;border-radius:10px;background:#f0f0f0;margin:2px 4px 2px 0">${g}</span>`).join('');

  content.innerHTML = `
    <div class="detail-row">
      <img class="detail-poster" src="${resolveImg(m.poster_path)}" alt="${m.title}"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22><rect fill=%22%23f0f0f0%22 width=%22200%22 height=%22300%22/><text x=%22100%22 y=%22155%22 text-anchor=%22middle%22 font-size=%2260%22 fill=%22%23ccc%22>🎬</text></svg>'">
      <div class="detail-info">
        <h2>${m.title} <span style="font-size:14px;font-weight:400;color:#999">${year}</span></h2>
        <div class="sub">
          ${runtimeStr ? `<span>⏱ ${runtimeStr}</span>` : ''}
          <span class="rating">⭐ ${m.vote_average.toFixed(1)}</span>
          ${m.director ? `<span>🎬 ${m.director}</span>` : ''}
        </div>
        ${genres ? `<div style="margin-top:8px">${genres}</div>` : ''}
        ${m.overview ? `<div class="desc">${m.overview}</div>` : ''}
      </div>
    </div>

    ${castHtml ? `
      <div class="section-title">🎭 演员</div>
      <div class="cast-list">${castHtml}</div>
    ` : ''}

    ${recHtml ? `
      <div class="section-title">🎯 相似推荐</div>
      <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px">${recHtml}</div>
    ` : ''}
  `;

  // 触发推荐图片的懒加载
  setTimeout(() => {
    content.querySelectorAll('.poster-wrap img.loading').forEach(img => {
      img.src = img.dataset.src;
    });
  }, 100);
}

// 关闭详情
function closeDetail() {
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('open');
  panel.dataset.movieId = '';
  detailOpen = false;
  document.querySelectorAll('.movie-card').forEach(el => el.style.outline = '');
}

// 启动
init();
</script>
</body>
</html>
